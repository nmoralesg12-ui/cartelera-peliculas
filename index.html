<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartelera de Películas</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #111;
            color: white;
        }

        .card {
            background-color: #222;
        }

        .card img {
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <h1 class="text-center my-4">🎬 Cartelera de Películas</h1>

    <!-- ✅ FILTROS -->
    <div class="container mb-4">
        <div class="row g-3">

            <!-- FILTRO POR UBICACIÓN -->
            <div class="col-md-4">
                <select id="filtroUbicacion" class="form-select">
                    <option value="">Todas las ubicaciones</option>
                </select>
            </div>

            <!-- BUSCAR POR GENERO -->
            <div class="col-md-4">
                <select id="buscarGenero" class="form-select">
    <option value="">Todos los géneros</option>
</select>
            </div>

        </div>
    </div>

    <!-- ✅ CONTENEDOR DE PELICULAS -->
    <div class="container">
        <div id="peliculas" class="row"></div>
    </div>

    <!-- ✅ SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
